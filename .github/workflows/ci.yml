name: Validate Apps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - kayros
          - nomen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - run: npm ci
        working-directory: ${{ matrix.app }}

      - run: npm run pack
        working-directory: ${{ matrix.app }}

      - run: npm run pack:discovery
        working-directory: ${{ matrix.app }}

  pages-shape:
    runs-on: ubuntu-latest
    needs: apps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            kayros/package-lock.json
            nomen/package-lock.json
      - run: npm ci
        working-directory: kayros
      - run: npm ci
        working-directory: nomen
      - run: npm run pack:discovery
        working-directory: kayros
      - run: npm run pack:discovery
        working-directory: nomen
      - run: node scripts/build-pages-site.mjs
