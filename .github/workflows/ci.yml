name: Validate Apps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  kayros:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kayros/package-lock.json

      - run: npm ci
        working-directory: kayros

      - run: npm run pack
        working-directory: kayros

      - run: npm run pack:discovery
        working-directory: kayros

      - run: node scripts/build-pages-site.mjs
