name: Deploy Pages

on:
  push:
    tags:
      - 'kayros-v*'
      - 'nomen-v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            kayros/package-lock.json
            nomen/package-lock.json
      - run: npm ci
        working-directory: kayros
      - run: npm ci
        working-directory: nomen
      - run: npm run pack:discovery
        working-directory: kayros
      - run: npm run pack:discovery
        working-directory: nomen
      - run: node scripts/build-pages-site.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages
      - id: deployment
        uses: actions/deploy-pages@v4
