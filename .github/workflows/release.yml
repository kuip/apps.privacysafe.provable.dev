name: Release Kayros

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kayros/package-lock.json

      - run: npm ci
        working-directory: kayros

      - run: npm run pack
        working-directory: kayros
      - run: npm run pack:discovery
        working-directory: kayros

      - run: node scripts/build-pages-site.mjs

      - name: Archive discovery site
        run: tar -C build -czf kayros/build/kayros.app.provable.dev-discovery-${{ github.ref_name || 'manual' }}.tar.gz pages

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kayros-build-assets
          path: |
            kayros/build/*.zip
            kayros/build/*.tar.gz

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kayros/build/*.zip
            kayros/build/*.tar.gz
